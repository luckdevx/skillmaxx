name: Compatibility

on:
  workflow_run:
    workflows: [CLI]
    types: [completed]

permissions:
  contents: read

jobs:
  compat:
    name: Node ${{ matrix.node-version }} / ${{ matrix.os }}
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        node-version: [22]
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: pnpm/action-setup@v5

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/skillmaxx

      - name: Run tests
        run: pnpm test
        working-directory: packages/skillmaxx

      - name: E2E — install skills in fake project
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/test-project"
          echo '{ "dependencies": { "next": "15.0.0", "react": "19.0.0" } }' > "$RUNNER_TEMP/test-project/package.json"
          cd "$RUNNER_TEMP/test-project"
          node "$GITHUB_WORKSPACE/packages/skillmaxx/index.mjs" -y --verbose

  # TODO: after forking, update to use `npx skillmaxx`
